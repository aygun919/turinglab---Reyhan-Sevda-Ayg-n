name: "unary_increment"
description: "Tekli sayıyı bir artırır. Örnek: 111 -> 1111"

states: [q0, q_accept]
input_alphabet: ["1"]
tape_alphabet: ["1", "B"]
blank: "B"
start_state: q0
accept_states: [q_accept]
reject_states: []

transitions:
  - {state: q0, read: "1", next: q0,       write: "1", move: R}
  - {state: q0, read: "B", next: q_accept, write: "1", move: R}
  