name: "unary_to_binary"
description: "Tekli sayıyı ikiliye çevirir. Örnek: 111 -> 11"

states: [q_find, q_mark, q_to_end, q_carry,
         q_ov_end, q_ov_back, q_ov_fix,
         q_rewind, q_wipe, q_accept]

input_alphabet: ["1"]
tape_alphabet: ["1", "0", "X", "B", "#"]
blank: "B"
start_state: q_find
accept_states: [q_accept]
reject_states: []

transitions:
  - {state: q_find, read: "X", next: q_find,  write: "X", move: R}
  - {state: q_find, read: "1", next: q_mark,  write: "X", move: R}
  - {state: q_find, read: "#", next: q_wipe,  write: "B", move: L}

  - {state: q_mark, read: "1", next: q_mark,   write: "1", move: R}
  - {state: q_mark, read: "X", next: q_mark,   write: "X", move: R}
  - {state: q_mark, read: "#", next: q_to_end, write: "#", move: R}
  - {state: q_mark, read: "B", next: q_carry,  write: "#", move: R}

  - {state: q_to_end, read: "0", next: q_to_end, write: "0", move: R}
  - {state: q_to_end, read: "1", next: q_to_end, write: "1", move: R}
  - {state: q_to_end, read: "B", next: q_carry,  write: "B", move: L}

  - {state: q_carry, read: "0", next: q_rewind,  write: "1", move: L}
  - {state: q_carry, read: "1", next: q_carry,   write: "0", move: L}
  - {state: q_carry, read: "B", next: q_rewind,  write: "1", move: L}
  - {state: q_carry, read: "X", next: q_rewind,  write: "X", move: L}
  - {state: q_carry, read: "#", next: q_ov_end,  write: "#", move: R}

  - {state: q_ov_end, read: "0", next: q_ov_end,  write: "0", move: R}
  - {state: q_ov_end, read: "B", next: q_ov_back, write: "0", move: L}

  - {state: q_ov_back, read: "0", next: q_ov_back, write: "0", move: L}
  - {state: q_ov_back, read: "#", next: q_ov_fix,  write: "#", move: R}

  - {state: q_ov_fix, read: "0", next: q_rewind, write: "1", move: L}

  - {state: q_rewind, read: "0", next: q_rewind, write: "0", move: L}
  - {state: q_rewind, read: "1", next: q_rewind, write: "1", move: L}
  - {state: q_rewind, read: "X", next: q_rewind, write: "X", move: L}
  - {state: q_rewind, read: "#", next: q_rewind, write: "#", move: L}
  - {state: q_rewind, read: "B", next: q_find,   write: "B", move: R}

  - {state: q_wipe, read: "X", next: q_wipe,   write: "B", move: L}
  - {state: q_wipe, read: "B", next: q_accept, write: "B", move: R}